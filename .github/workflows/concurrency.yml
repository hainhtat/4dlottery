name: Concurrency

on:
  schedule:
    # Daily 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  issue-tickets-race:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CI_AGENT_EMAIL: ${{ secrets.CI_AGENT_EMAIL }}
      CI_AGENT_PASSWORD: ${{ secrets.CI_AGENT_PASSWORD }}
      AGENT_JWT: ${{ secrets.AGENT_JWT }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Supabase secrets
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Add repository secrets: NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" ] && [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Add NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY or NEXT_PUBLIC_SUPABASE_ANON_KEY"
            exit 1
          fi
          if [ -z "$AGENT_JWT" ] && { [ -z "$CI_AGENT_EMAIL" ] || [ -z "$CI_AGENT_PASSWORD" ]; }; then
            echo "::error::Add CI_AGENT_EMAIL + CI_AGENT_PASSWORD, or AGENT_JWT"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run test:concurrency
